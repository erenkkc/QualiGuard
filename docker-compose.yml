services:
  qualiguard:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - qualiguard-data:/data
      - ./qualiguard.yaml:/app/qualiguard.yaml:ro
      - ./demos:/app/demos:ro
      - ./testdata:/app/testdata:ro
    environment:
      QG_DATA_DIR: /data
    command:
      - qg-server
      - --host
      - "0.0.0.0"
      - --port
      - "9000"
      - --data-dir
      - /data
      - --work-dir
      - /app
      - --config
      - /app/qualiguard.yaml
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/api/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  qualiguard-data:
