<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QualiGuard</title>
  __QG_THEME_CSS__
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #e8eef7;
      --muted: #8b9bb0;
      --accent: #4d9fff;
      --line: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      font-family: "Instrument Sans", system-ui, sans-serif;
      color: var(--ink);
      background: #070a0f;
      overflow: hidden;
      user-select: none;
    }
    .stage {
      position: relative; height: 100%;
      background:
        radial-gradient(ellipse 55% 45% at 50% 35%, rgba(77,159,255,.16), transparent 65%),
        radial-gradient(ellipse 40% 30% at 80% 10%, rgba(52,199,89,.08), transparent 50%),
        linear-gradient(180deg, #0a1018 0%, #070a0f 100%);
    }

    /* —— Splash —— */
    .splash {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      transition: opacity .7s ease, transform .7s ease;
    }
    .splash.out {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }
    .splash-inner { text-align: center; padding: 24px; }
    .logo {
      width: 72px; height: 72px; margin: 0 auto 22px;
      border-radius: 18px;
      display: grid; place-items: center;
      color: var(--accent);
      background: linear-gradient(145deg, rgba(77,159,255,.2), rgba(77,159,255,.05));
      border: 1px solid rgba(77,159,255,.35);
      box-shadow: 0 16px 40px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.03) inset;
      animation: rise .8s cubic-bezier(.22,1,.36,1) both;
    }
    .logo svg { width: 38px; height: 38px; }
    .brand {
      margin: 0 0 8px;
      font-family: Newsreader, Georgia, serif;
      font-size: 2.35rem; font-weight: 600; letter-spacing: -.02em;
      animation: rise .8s .08s cubic-bezier(.22,1,.36,1) both;
    }
    .tag {
      margin: 0 0 36px; color: var(--muted); font-size: .98rem;
      animation: rise .8s .14s cubic-bezier(.22,1,.36,1) both;
    }
    .bar {
      width: 180px; height: 3px; margin: 0 auto; border-radius: 999px;
      background: rgba(255,255,255,.08); overflow: hidden;
      animation: rise .8s .2s cubic-bezier(.22,1,.36,1) both;
    }
    .bar > i {
      display: block; height: 100%; width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #4d9fff, #34c759);
      transition: width .35s ease;
    }
    .status {
      margin-top: 14px; font-size: .82rem; color: var(--muted);
      letter-spacing: .02em;
      animation: rise .8s .24s cubic-bezier(.22,1,.36,1) both;
    }

    /* —— Login —— */
    .auth {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      padding: 28px 16px;
      opacity: 0; transform: translateY(18px);
      pointer-events: none;
      transition: opacity .65s ease, transform .65s cubic-bezier(.22,1,.36,1);
    }
    .auth.on {
      opacity: 1; transform: none; pointer-events: auto;
    }
    .card {
      width: 100%; max-width: 400px;
      padding: 36px 30px 28px;
      border-radius: 22px;
      background: rgba(15,20,28,.92);
      border: 1px solid var(--line);
      box-shadow: 0 28px 70px rgba(0,0,0,.45);
      backdrop-filter: blur(12px);
    }
    .card .mark {
      width: 44px; height: 44px; margin: 0 auto 14px; border-radius: 12px;
      display: grid; place-items: center; color: var(--accent);
      background: rgba(77,159,255,.12); border: 1px solid rgba(77,159,255,.28);
    }
    .card .mark svg { width: 24px; height: 24px; }
    .card h1 {
      margin: 0 0 6px; text-align: center;
      font-family: Newsreader, Georgia, serif;
      font-size: 1.7rem; font-weight: 600;
    }
    .card .lead {
      margin: 0 0 22px; text-align: center;
      color: var(--muted); font-size: .92rem;
    }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
    .field span { font-size: .82rem; color: var(--muted); }
    .field input {
      padding: 12px 14px; border-radius: 11px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03); color: var(--ink);
      font: inherit; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: rgba(77,159,255,.55);
      box-shadow: 0 0 0 3px rgba(77,159,255,.15);
    }
    .err { color: #ff8a8a; font-size: .86rem; min-height: 1.2em; margin: 0 0 10px; }
    .btn {
      width: 100%; margin-top: 4px; padding: 12px 16px; border: 0; border-radius: 11px;
      background: linear-gradient(135deg, #4d9fff, #3a7fd9); color: #fff;
      font: inherit; font-weight: 600; cursor: pointer;
      transition: transform .15s, filter .15s;
    }
    .btn:hover { filter: brightness(1.06); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .65; cursor: wait; }
    .switch {
      margin-top: 16px; text-align: center; color: var(--muted); font-size: .88rem;
    }
    .switch button {
      background: none; border: 0; color: var(--accent);
      font: inherit; cursor: pointer; padding: 0;
    }
    .panel { display: none; }
    .panel.on { display: block; animation: fadeIn .4s ease; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <section class="splash" id="splash">
      <div class="splash-inner">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L4 5v6c0 5.25 3.4 10.15 8 11 4.6-.85 8-5.75 8-11V5l-8-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h1 class="brand">__QG_BRAND_NAME__</h1>
        <p class="tag">Kod kalitesi, tek pencerede</p>
        <div class="bar"><i id="bar"></i></div>
        <p class="status" id="status">Başlatılıyor…</p>
      </div>
    </section>

    <section class="auth" id="auth">
      <div class="card">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L4 5v6c0 5.25 3.4 10.15 8 11 4.6-.85 8-5.75 8-11V5l-8-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>

        <div class="panel on" id="panel-login">
          <h1>Hoş geldin</h1>
          <p class="lead">Hesabına girerek panele geç</p>
          <form id="login-form">
            <label class="field"><span>E-posta</span><input type="email" id="login-email" autocomplete="username" required></label>
            <label class="field"><span>Şifre</span><input type="password" id="login-pass" autocomplete="current-password" required></label>
            <p class="err" id="login-err"></p>
            <button class="btn" type="submit" id="login-btn">Giriş yap</button>
          </form>
          <p class="switch">Hesabın yok mu? <button type="button" id="to-reg">Hesap oluştur</button></p>
        </div>

        <div class="panel" id="panel-reg">
          <h1>Hesap oluştur</h1>
          <p class="lead">Bir dakikada kurulum tamamlanır</p>
          <form id="reg-form">
            <label class="field"><span>E-posta</span><input type="email" id="reg-email" autocomplete="email" required></label>
            <label class="field"><span>Şifre</span><input type="password" id="reg-pass" autocomplete="new-password" required minlength="8"></label>
            <p class="err" id="reg-err"></p>
            <button class="btn" type="submit" id="reg-btn">Kaydol ve devam et</button>
          </form>
          <p class="switch">Zaten hesabın var mı? <button type="button" id="to-login">Giriş yap</button></p>
        </div>
      </div>
    </section>
  </div>
  <script>
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    const bar = document.getElementById("bar");
    const status = document.getElementById("status");

    async function boot() {
      const steps = [
        [18, "Ortam hazırlanıyor…"],
        [42, "Arayüz yükleniyor…"],
        [68, "Oturum kontrol ediliyor…"],
        [92, "Neredeyse hazır…"],
        [100, "Tamam"],
      ];
      for (const [pct, text] of steps) {
        bar.style.width = pct + "%";
        status.textContent = text;
        await sleep(pct === 100 ? 280 : 320 + Math.random() * 180);
      }

      // Zaten girişliyse doğrudan panel
      const token = localStorage.getItem("qg_token") || "";
      if (token.startsWith("ugs_") || token.startsWith("qg_")) {
        try {
          const res = await fetch("/api/auth/me", { headers: { Authorization: "Bearer " + token } });
          if (res.ok) {
            location.href = "/app";
            return;
          }
        } catch {}
      }

      document.getElementById("splash").classList.add("out");
      await sleep(420);
      document.getElementById("auth").classList.add("on");
      document.getElementById("login-email").focus();
    }

    function show(panel) {
      document.getElementById("panel-login").classList.toggle("on", panel === "login");
      document.getElementById("panel-reg").classList.toggle("on", panel === "reg");
    }
    document.getElementById("to-reg").onclick = () => show("reg");
    document.getElementById("to-login").onclick = () => show("login");

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("login-err");
      const btn = document.getElementById("login-btn");
      err.textContent = "";
      btn.disabled = true;
      btn.textContent = "Giriş yapılıyor…";
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("login-email").value.trim(),
            password: document.getElementById("login-pass").value,
          }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || "Giriş başarısız");
        localStorage.setItem("qg_token", body.token);
        if (body.user?.email) localStorage.setItem("qg_email", body.user.email);
        document.getElementById("auth").style.opacity = "0";
        document.getElementById("auth").style.transform = "translateY(-10px)";
        await sleep(320);
        location.href = "/app";
      } catch (ex) {
        err.textContent = ex.message || "Giriş başarısız";
        btn.disabled = false;
        btn.textContent = "Giriş yap";
      }
    });

    document.getElementById("reg-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("reg-err");
      const btn = document.getElementById("reg-btn");
      err.textContent = "";
      btn.disabled = true;
      btn.textContent = "Oluşturuluyor…";
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("reg-email").value.trim(),
            password: document.getElementById("reg-pass").value,
          }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || "Kayıt başarısız");
        localStorage.setItem("qg_token", body.token);
        if (body.user?.email) localStorage.setItem("qg_email", body.user.email);
        document.getElementById("auth").style.opacity = "0";
        await sleep(320);
        location.href = "/app";
      } catch (ex) {
        err.textContent = ex.message || "Kayıt başarısız";
        btn.disabled = false;
        btn.textContent = "Kaydol ve devam et";
      }
    });

    boot();
  </script>
</body>
</html>
