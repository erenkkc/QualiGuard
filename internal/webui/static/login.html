<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — __QG_BRAND_NAME__</title>
  __QG_THEME_CSS__
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/landing.css?v=3">
  <style>
    body { font-family: "Instrument Sans", system-ui, sans-serif; margin: 0; }
    .login-shell {
      min-height: 100vh; display: grid; place-items: center; padding: 28px 16px;
      background:
        radial-gradient(ellipse 50% 40% at 50% 0%, rgba(77,159,255,.12), transparent 60%),
        #070a0f;
    }
    .login-card {
      width: 100%; max-width: 380px; text-align: center;
      padding: 36px 28px 28px; border-radius: 20px;
      background: #0f141c; border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
    }
    .mark {
      width: 48px; height: 48px; margin: 0 auto 16px; border-radius: 12px;
      display: grid; place-items: center; color: var(--accent);
      background: rgba(77,159,255,.12); border: 1px solid rgba(77,159,255,.28);
    }
    .mark svg { width: 26px; height: 26px; }
    .login-card h1 {
      margin: 0 0 6px; font-family: Newsreader, Georgia, serif;
      font-size: 1.75rem; font-weight: 600;
    }
    .login-card .lead { margin: 0 0 24px; color: var(--muted); font-size: .95rem; }
    .login-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; text-align: left; }
    .login-field span { font-size: .85rem; color: var(--muted); }
    .login-field input {
      padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: rgba(255,255,255,.03); color: var(--text); font: inherit;
    }
    .login-error { color: #ff8a8a; font-size: .88rem; min-height: 1.2em; margin: 0 0 12px; text-align: left; }
    .foot { margin-top: 18px; color: var(--muted); font-size: .88rem; }
    .foot a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-shell">
    <form class="login-card" id="login-form">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L4 5v6c0 5.25 3.4 10.15 8 11 4.6-.85 8-5.75 8-11V5l-8-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1>Tekrar hoş geldin</h1>
      <p class="lead">Hesabına gir — indirmelerin ve panel seni bekliyor.</p>
      <label class="login-field">
        <span>E-posta</span>
        <input type="email" id="email" autocomplete="email" required autofocus>
      </label>
      <label class="login-field">
        <span>Şifre</span>
        <input type="password" id="password" autocomplete="current-password" required>
      </label>
      <p class="login-error" id="login-error"></p>
      <button type="submit" class="btn primary" style="width:100%">Giriş yap</button>
      <p class="foot">Hesabın yok mu? <a href="/register">Kaydol</a> · <a href="/">Ana sayfa</a></p>
    </form>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "/indir";
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-error");
      errEl.textContent = "";
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
          }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || "Giriş başarısız");
        localStorage.setItem("qg_token", body.token);
        if (body.user?.email) localStorage.setItem("qg_email", body.user.email);
        location.href = next;
      } catch (err) {
        errEl.textContent = err.message || "Giriş başarısız";
      }
    });
  </script>
</body>
</html>
