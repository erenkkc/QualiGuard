<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaydol — __QG_BRAND_NAME__</title>
  __QG_THEME_CSS__
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/landing.css?v=2">
  <style>
    body { font-family: "Instrument Sans", system-ui, sans-serif; }
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card {
      width: 100%; max-width: 420px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 18px; padding: 32px 28px; box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }
    .login-card h1 { margin: 0 0 6px; font-size: 1.35rem; }
    .login-card .lead { margin: 0 0 20px; color: var(--muted); font-size: .92rem; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1; text-align: center; padding: 10px; border-radius: 10px; text-decoration: none;
      color: var(--muted); border: 1px solid var(--border); font-weight: 600; font-size: .88rem;
    }
    .tab.on { color: var(--text); border-color: rgba(77,159,255,.45); background: rgba(77,159,255,.1); }
    .login-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .login-field span { font-size: .85rem; color: var(--muted); }
    .login-field input {
      padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: rgba(255,255,255,.03); color: var(--text); font: inherit;
    }
    .login-error { color: #ff8a8a; font-size: .88rem; min-height: 1.2em; margin: 0 0 12px; }
    .login-back { display: block; margin-top: 16px; text-align: center; color: var(--muted); font-size: .85rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="reg-form">
      <h1>Hesap oluştur</h1>
      <p class="lead">Kayıt ol, giriş yap, Windows veya Mac paketini indir.</p>
      <div class="tabs">
        <a class="tab" href="/login">Giriş</a>
        <a class="tab on" href="/register">Kaydol</a>
      </div>
      <label class="login-field">
        <span>E-posta</span>
        <input type="email" id="email" autocomplete="email" required autofocus>
      </label>
      <label class="login-field">
        <span>Şifre (en az 6 karakter)</span>
        <input type="password" id="password" autocomplete="new-password" minlength="6" required>
      </label>
      <label class="login-field">
        <span>Şifre tekrar</span>
        <input type="password" id="password2" autocomplete="new-password" minlength="6" required>
      </label>
      <p class="login-error" id="login-error"></p>
      <button type="submit" class="btn primary" style="width:100%">Kaydol</button>
      <a href="/" class="login-back">← Ana sayfa</a>
    </form>
  </div>
  <script>
    document.getElementById("reg-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-error");
      errEl.textContent = "";
      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;
      if (password !== password2) {
        errEl.textContent = "Şifreler eşleşmiyor";
        return;
      }
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password,
          }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || "Kayıt başarısız");
        localStorage.setItem("qg_token", body.token);
        if (body.user?.email) localStorage.setItem("qg_email", body.user.email);
        location.href = "/indir";
      } catch (err) {
        errEl.textContent = err.message || "Kayıt başarısız";
      }
    });
  </script>
</body>
</html>
